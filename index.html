<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>記帳很重要</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --g:#1D9E75;--gl:#E1F5EE;--gd:#0A5040;
  --r:#E24B4A;--rl:#FEF0F0;--b:#378ADD;--bl:#E6F1FB;--y:#E8A020;
  --bg:#F7F5F0;--sf:#FFFFFF;--sf2:#EFEFEA;
  --bd:rgba(0,0,0,0.09);--bds:rgba(0,0,0,0.15);
  --t1:#1A1917;--t2:#5A5854;--t3:#9A9692;
  --ra:14px;--rs:8px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#141412;--sf:#1E1D1B;--sf2:#272522;
  --bd:rgba(255,255,255,0.08);--bds:rgba(255,255,255,0.15);
  --t1:#F0EDE8;--t2:#A09C97;--t3:#6A6662;
  --gl:#0A2E1E;--bl:#0A1E30;--rl:#2E0A0A;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:480px;margin:0 auto;padding-bottom:60px}
.hdr{padding:20px 18px 10px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:22px;font-weight:700}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-d{font-family:'DM Mono',monospace;font-size:12px;color:var(--t3)}
.sync-btn{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--t3);background:none;border:1px solid var(--bd);border-radius:20px;padding:4px 10px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.sync-btn:active{opacity:.7}
.sync-btn.spinning svg{animation:spin .8s linear infinite}
.sync-btn.syncing{color:var(--b)}
@keyframes spin{to{transform:rotate(360deg)}}
.cache-age{font-size:10px;color:var(--t3);padding:0 18px 6px;text-align:right;min-height:14px}
.tabs{display:flex;margin:0 14px 14px;background:var(--sf2);border-radius:var(--rs);padding:3px;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:fit-content;padding:8px 5px;border:none;background:transparent;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;color:var(--t3);font-family:'Noto Sans TC',sans-serif;transition:all .15s;white-space:nowrap}
.tab.on{background:var(--sf);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.card{background:var(--sf);border-radius:var(--ra);border:1px solid var(--bd);margin:0 14px 12px;padding:18px}
.slbl{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px}
section{display:none}section.on{display:block}
.lmsg{text-align:center;padding:2rem;color:var(--t3);font-size:14px}

/* Entry */
.cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.cb{padding:10px 2px;border:1px solid var(--bds);background:var(--sf);border-radius:var(--rs);font-size:13px;cursor:pointer;color:var(--t2);text-align:center;font-family:'Noto Sans TC',sans-serif;transition:all .12s;line-height:1.3}
.cb:active{transform:scale(.95)}
.cb.inc{border-color:#85B7EB;background:var(--bl);color:#185FA5}
.cb.on{background:var(--b);color:#fff;border-color:var(--b);font-weight:700}
.cb.inc.on{background:var(--gd);border-color:var(--gd)}
.divl{height:1px;background:var(--bd);margin:14px 0}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.lbl{font-size:12px;color:var(--t3)}
input[type=number],input[type=date],input[type=text]{width:100%;padding:10px 12px;border:1px solid var(--bds);border-radius:var(--rs);background:var(--bg);color:var(--t1);font-size:15px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .15s}
input:focus{border-color:var(--g)}
.trow{display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px;border-top:1px solid var(--bd);margin-top:4px}
.tog{position:relative;width:44px;height:24px;cursor:pointer;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tsl{position:absolute;inset:0;background:var(--bds);border-radius:12px;transition:.2s}
.tsl:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
input:checked+.tsl{background:var(--b)}
input:checked+.tsl:before{transform:translateX(20px)}
.ibox{background:var(--sf2);border-radius:var(--rs);padding:12px;margin-bottom:12px}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.pill{padding:5px 13px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid var(--bds);background:transparent;color:var(--t2);font-family:'Noto Sans TC',sans-serif;transition:all .12s}
.pill.on{background:var(--b);color:#fff;border-color:var(--b)}
.iprev{font-size:12px;color:var(--t3);margin-top:8px;min-height:16px}
.sbtn{padding:15px;background:#E8D5B0;color:#5C4A2A;border:1px solid #C9B48A;border-radius:var(--ra);font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:opacity .15s,transform .1s;margin:0 14px;width:calc(100% - 28px);display:block}
.sbtn:active:not(:disabled){transform:scale(.98);opacity:.85}
.sbtn:disabled{opacity:.5;cursor:not-allowed}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.cc-card{background:var(--sf);border-radius:var(--ra);border:1px solid var(--bd);margin:12px 14px;padding:16px 18px}
.cc-title{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:12px}
.cc-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bd)}
.cc-row:last-child{border-bottom:none}
.cc-info{display:flex;align-items:center;gap:10px}
.cc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cc-name{font-size:14px;font-weight:500;color:var(--t1)}
.cc-date{font-size:12px;color:var(--t3);margin-top:1px}
.cc-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--bds);background:transparent;cursor:pointer;appearance:none;-webkit-appearance:none;flex-shrink:0;transition:all .15s;position:relative}
.cc-check:checked{background:var(--g);border-color:var(--g)}
.cc-check:checked::after{content:'✓';position:absolute;color:white;font-size:12px;font-weight:700;top:50%;left:50%;transform:translate(-50%,-50%)}
.cc-row.done .cc-name{text-decoration:line-through;opacity:.5}
.cc-row.done .cc-date{opacity:.4}
.cc-alert{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700;background:#FAEEDA;color:#633806}

/* Common metrics */
.m3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.mc{background:var(--sf2);border-radius:var(--rs);padding:12px;text-align:center}
.ml{font-size:11px;color:var(--t3)}
.mn{font-size:17px;font-weight:700;margin-top:4px;font-family:'DM Mono',monospace;letter-spacing:-.5px}
.mn-sub{font-size:10px;color:var(--t3);margin-top:3px}
.gi{color:var(--g)}.ri{color:var(--r)}.bi{color:var(--b)}
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mnav button{background:none;border:1px solid var(--bds);border-radius:var(--rs);padding:6px 14px;cursor:pointer;font-size:16px;color:var(--t1);font-family:'Noto Sans TC',sans-serif;line-height:1}
.mlbl{font-size:16px;font-weight:700}

/* Balance */
.bal-block{background:var(--sf);border-radius:var(--ra);margin:0 14px 12px;padding:14px 20px;border:1px solid var(--bds);cursor:pointer;user-select:none}
.bal-num{font-size:28px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-1px;transition:filter .25s}
.bal-num.hidden{filter:blur(8px)}
.bal-sub{font-size:11px;color:var(--t3);margin-top:4px;transition:filter .25s}
.bal-sub.hidden{filter:blur(6px)}
.bal-lbl{font-size:12px;opacity:.8;margin-bottom:4px}

/* Charts */
.cw{position:relative;width:100%}
.cw.h180{height:180px}.cw.h220{height:220px}.cw.h260{height:260px}

/* BD bars */
.br{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bn{font-size:12px;color:var(--t2);min-width:44px}
.bbg{flex:1;height:5px;background:var(--sf2);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px}
.ba{font-size:12px;color:var(--t3);min-width:62px;text-align:right;font-family:'DM Mono',monospace}

/* TX list */
.tl{display:flex;flex-direction:column;max-height:320px;overflow-y:auto}
.ti{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bd)}
.ti:last-child{border-bottom:none}
.tc{font-size:11px;padding:2px 7px;border-radius:10px;background:var(--sf2);color:var(--t3)}
.tn{font-size:12px;color:var(--t3);margin-top:2px}
.tai{color:var(--g);font-weight:700;font-family:'DM Mono',monospace;font-size:14px}
.tae{color:var(--r);font-weight:700;font-family:'DM Mono',monospace;font-size:14px}
.tit{font-size:10px;color:var(--b);margin-left:4px}
.emp{text-align:center;padding:2rem;color:var(--t3);font-size:14px}

/* Inst */
.ic{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:14px;margin-bottom:8px}
.ipr{height:4px;background:var(--sf2);border-radius:2px;margin:10px 0;overflow:hidden}
.ib{height:100%;background:var(--b);border-radius:2px}
.bdg{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700}
.bbl{background:var(--bl);color:var(--b)}
.bgl{background:var(--gl);color:var(--g)}

/* Analysis */
.cat-select{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.cat-pill{padding:5px 11px;border-radius:20px;font-size:12.5px;cursor:pointer;border:1px solid var(--bds);background:transparent;color:var(--t2);font-family:'Noto Sans TC',sans-serif;transition:all .12s}
.cat-pill.on{background:var(--b);color:white;border-color:var(--b)}
.year-sel{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.year-pill{padding:5px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid var(--bds);background:transparent;color:var(--t2);font-family:'Noto Sans TC',sans-serif;transition:all .12s}
.year-pill.on{background:var(--t1);color:var(--bg);border-color:var(--t1)}
.donut-wrap{display:flex;align-items:center;gap:14px}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:5px;overflow:hidden}
.legend-item{display:flex;align-items:center;gap:7px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-text{font-size:12px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.legend-pct{font-size:11px;font-family:'DM Mono',monospace;color:var(--t3)}
.cat-list{display:flex;flex-direction:column}
.cat-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)}
.cat-row:last-child{border-bottom:none}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-name{flex:1;font-size:13px;color:var(--t2)}
.cat-bar-wrap{width:60px;height:4px;background:var(--sf2);border-radius:2px;overflow:hidden}
.cat-bar{height:100%;border-radius:2px}
.cat-pct{font-size:11px;color:var(--t3);min-width:32px;text-align:right}
.cat-amt{font-size:13px;font-family:'DM Mono',monospace;font-weight:500;min-width:60px;text-align:right}
.yoy-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd)}
.yoy-row:last-child{border-bottom:none}
.yoy-lbl{font-size:13px;color:var(--t2);flex:1}
.yoy-vals{display:flex;align-items:center;gap:8px}
.yoy-cur{font-size:13px;font-family:'DM Mono',monospace;min-width:52px;text-align:right}
.yoy-diff{font-size:11px;font-family:'DM Mono',monospace;min-width:50px;text-align:right;padding:2px 5px;border-radius:4px}
.yoy-diff.up{color:var(--r);background:var(--rl)}
.yoy-diff.dn{color:var(--g);background:var(--gl)}
.yoy-diff.eq{color:var(--t3)}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd)}
.stat-row:last-child{border-bottom:none}
.stat-lbl{font-size:13px;color:var(--t2)}
.stat-val{font-size:13px;font-family:'DM Mono',monospace;font-weight:500}

/* Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;transition:opacity .2s;pointer-events:none}
.ov.show{opacity:1;pointer-events:all}
.mod{background:var(--sf);border-radius:20px;padding:24px;width:min(380px,92vw);border:1px solid var(--bd);transform:translateY(16px);transition:transform .22s}
.ov.show .mod{transform:translateY(0)}
.mbdg{display:inline-block;background:var(--gl);color:var(--gd);font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:10px}
.mt{font-size:18px;font-weight:700;margin-bottom:3px}
.ms{font-size:13px;color:var(--t3);margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--bd)}
.cbtn{width:100%;padding:12px;border:1px solid var(--bds);background:transparent;border-radius:var(--rs);font-size:14px;cursor:pointer;color:var(--t1);font-family:'Noto Sans TC',sans-serif;font-weight:500}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1917;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:200;white-space:nowrap;font-family:'Noto Sans TC',sans-serif}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <h1>記帳很重要</h1>
    <div class="hdr-right">
      <button class="sync-btn" id="syncBtn" onclick="forceSync()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
        同步
      </button>
      <span class="hdr-d" id="hdrD"></span>
    </div>
  </div>
  <div class="cache-age" id="cacheAge"></div>

  <div class="tabs">
    <button class="tab on" onclick="sw('entry',this)">記帳</button>
    <button class="tab" onclick="sw('report',this)">月報表</button>
    <button class="tab" onclick="sw('overview',this)">本月概況</button>
    <button class="tab" onclick="sw('yoy',this)">同期</button>
    <button class="tab" onclick="sw('yearly',this)">年度</button>
    <button class="tab" onclick="sw('catTab',this)">分類</button>
    <button class="tab" onclick="sw('inst',this)">分期</button>
  </div>

  <!-- 記帳 -->
  <section id="entry" class="on">
    <div class="card" style="padding-bottom:12px">
      <div class="slbl">類別</div>
      <div class="cgrid" id="cgrid"></div>
      <div class="divl"></div>
      <div class="r2" style="margin-top:12px">
        <div class="fg"><span class="lbl">金額（NT$）</span><input type="number" id="amt" placeholder="0" min="0" step="1" oninput="uprev()"></div>
        <div class="fg"><span class="lbl">日期</span><input type="date" id="dt"></div>
      </div>
      <div class="fg"><span class="lbl">備註（選填）</span><input type="text" id="note" placeholder=""></div>
      <div class="trow">
        <div><div style="font-size:14px;font-weight:500">分期付款</div><div style="font-size:12px;color:var(--t3);margin-top:2px">平均分配到每個月</div></div>
        <label class="tog"><input type="checkbox" id="itog" onchange="togi()"><span class="tsl"></span></label>
      </div>
      <div class="ibox" id="ibox" style="display:none">
        <div class="lbl">分幾期？</div>
        <div class="pills" id="pills"></div>
        <div class="iprev" id="iprev"></div>
      </div>
    </div>
    <button class="sbtn" id="sbtn" onclick="submit()">送出記帳</button>
    <div class="cc-card">
      <div class="cc-title">信用卡帳單提醒</div>
      <div class="cc-row" id="cc-ctbc"><div class="cc-info"><div class="cc-dot" style="background:#E24B4A"></div><div><div class="cc-name">中信銀行</div><div class="cc-date">每月 7 日出帳</div></div></div><input type="checkbox" class="cc-check" onchange="ccCheck('ctbc',this)"></div>
      <div class="cc-row" id="cc-fubon"><div class="cc-info"><div class="cc-dot" style="background:#378ADD"></div><div><div class="cc-name">富邦銀行</div><div class="cc-date">每月 20 日出帳</div></div></div><input type="checkbox" class="cc-check" onchange="ccCheck('fubon',this)"></div>
      <div class="cc-row" id="cc-esun"><div class="cc-info"><div class="cc-dot" style="background:#1D9E75"></div><div><div class="cc-name">玉山銀行</div><div class="cc-date">每月 21 日出帳</div></div></div><input type="checkbox" class="cc-check" onchange="ccCheck('esun',this)"></div>
    </div>
  </section>

  <!-- 月報表 -->
  <section id="report">
    <div class="bal-block" onclick="toggleBal()">
      <div class="bal-lbl">💰 總資產餘額（點擊顯示/隱藏）</div>
      <div class="bal-num" id="balNum">計算中…</div>
      <div class="bal-sub" id="balSub">載入中</div>
    </div>
    <div class="card">
      <div class="mnav"><button onclick="cm(-1)">‹</button><span class="mlbl" id="mlbl"></span><button onclick="cm(1)">›</button></div>
      <div class="slbl" style="margin-bottom:8px">本月明細</div><div class="tl" id="txl" style="max-height:none"></div>
    </div>
    <div style="padding:0 14px 8px;display:flex;justify-content:center">
      <a href="https://docs.google.com/spreadsheets/d/1CHkGnYv8uKF-WYmSLLQeXJXh0cDsb2Z0l_XOBmK79Tc" target="_blank" style="font-size:13px;color:var(--t3);text-decoration:none;padding:8px 16px;border:1px solid var(--bds);border-radius:20px;background:var(--sf)">Sheets ↗</a>
    </div>
  </section>

  <!-- 本月概況 -->
  <section id="overview">
    <div class="card">
      <div class="mnav"><button onclick="shiftOv(-1)">‹</button><span class="mlbl" id="ovLabel">—</span><button onclick="shiftOv(1)">›</button></div>
      <div class="m3" id="ovMetrics"><div style="grid-column:1/-1" class="lmsg">載入中…</div></div>
    </div>
    <div class="card">
      <div class="slbl">支出分類佔比</div>
      <div class="donut-wrap"><canvas id="donutChart" width="130" height="130" style="flex-shrink:0"></canvas><div class="donut-legend" id="donutLegend"></div></div>
    </div>
    <div class="card"><div class="slbl">各類別明細</div><div class="cat-list" id="ovCatList"></div></div>
  </section>

  <!-- 同期比較 -->
  <section id="yoy">
    <div class="card">
      <div class="mnav"><button onclick="shiftYoy(-1)">‹</button><span class="mlbl" id="yoyLabel">—</span><button onclick="shiftYoy(1)">›</button></div>
      <div class="m3" id="yoyMetrics"><div style="grid-column:1/-1" class="lmsg">載入中…</div></div>
    </div>
    <div class="card"><div class="slbl">各類別 今年 vs 去年</div><div id="yoyList" class="lmsg">載入中…</div></div>
  </section>

  <!-- 年度總覽 -->
  <section id="yearly">
    <div class="card">
      <div class="slbl">選擇年度</div>
      <div class="year-sel" id="yearSel"></div>
      <div class="cw h260"><canvas id="yearlyChart"></canvas></div>
    </div>
    <div class="card"><div class="slbl">年度統計</div><div id="yearlyStats" class="lmsg">載入中…</div></div>
  </section>

  <!-- 分類對比 -->
  <section id="catTab">
    <div class="card" style="padding-bottom:12px">
      <div class="slbl">選擇類別（可多選）</div>
      <div class="cat-select" id="catSelect"></div>
    </div>
    <div class="card">
      <div class="mnav"><button onclick="shiftCat(-1)">‹</button><span class="mlbl" id="catLabel">—</span><button onclick="shiftCat(1)">›</button></div>
      <div class="cw h260"><canvas id="catChart"></canvas></div>
    </div>
  </section>

  <!-- 分期 -->
  <section id="inst">
    <div class="card" style="padding:12px 18px"><span style="font-size:13px;color:var(--t3)">進行中的分期，每月自動計入支出</span></div>
    <div style="padding:0 14px" id="il"></div>
  </section>
</div>

<div class="ov" id="ov">
  <div class="mod">
    <div class="mbdg" id="mbdg"></div>
    <div class="mt">本月收支總覽</div>
    <div class="ms" id="ms"></div>
    <div class="m3" id="mm" style="margin-bottom:16px"></div>
    <div id="mbd" style="margin-bottom:16px"></div>
    <button class="cbtn" onclick="closeOv()">好，繼續記帳</button>
  </div>
</div>
<div class="toast" id="tst"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const API='https://script.google.com/macros/s/AKfycbxIoYsdmZNjbonxcRtYcnyqXNxVBCh_DduL_t2N_agQ95E3ubAikeyYp3jvfqyXAqw8/exec';
const MN=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const CATS_DEF=[
  {n:'收入',i:true},
  {n:'餐費'},{n:'點心'},{n:'飲品'},{n:'咖啡'},{n:'飲酒'},{n:'煮食'},
  {n:'居家'},{n:'安の'},{n:'貓貓'},{n:'交通'},
  {n:'電子'},{n:'軟體'},{n:'娛樂'},{n:'美妝'},{n:'衣著'},
  {n:'貸款'},{n:'醫藥'},{n:'手續'},{n:'社交'},{n:'孝親'},{n:'其他'}
];
const CAT_NAMES=CATS_DEF.filter(c=>!c.i).map(c=>c.n);
const CAT_COLORS=['#4CADE6','#5DCAA5','#F09595','#BA7517','#7F77DD','#D85A30','#E8A020','#85C97A','#C490D1','#5BADD6','#F0C065','#7EC8C8','#E87AAA','#90B870','#D4924F','#8894C8','#72BFA0','#E6846A','#98A8D4','#C8C870','#A0A09A'];

const NOW=new Date();
let selCat=null,selM=3,balHidden=false;
let repY=NOW.getFullYear(),repMo=NOW.getMonth();
let ovY=NOW.getFullYear(),ovM=NOW.getMonth();
let yoyY=NOW.getFullYear(),yoyM=NOW.getMonth();
let yearlyYear=NOW.getFullYear();
let catEndY=NOW.getFullYear(),catEndM=NOW.getMonth();
let selectedCats=['餐費'];
let catC=null,yearlyC=null,donutC=null;
let insts=JSON.parse(localStorage.getItem('fi')||'[]');

/* ── Cache ── */
const CK='kakeibo_v4',TTL=4*60*60*1000;
let mem={};
function loadCache(){
  try{
    const r=localStorage.getItem(CK);if(!r)return;
    const o=JSON.parse(r),age=Date.now()-(o._ts||0);
    if(age<TTL){mem=o;setAgeLabel(age);}else localStorage.removeItem(CK);
  }catch(e){}
}
function saveCache(){try{mem._ts=Date.now();localStorage.setItem(CK,JSON.stringify(mem));setAgeLabel(0);}catch(e){}}
function setAgeLabel(ms){
  const el=document.getElementById('cacheAge');if(!el)return;
  if(ms<60000){el.textContent='資料為最新';return;}
  const m=Math.floor(ms/60000);
  el.textContent=m<60?`${m} 分鐘前同步`:`${Math.floor(m/60)} 小時前同步`;
}
async function forceSync(){
  const btn=document.getElementById('syncBtn');
  btn.classList.add('spinning','syncing');
  mem={};try{localStorage.removeItem(CK);}catch(e){}
  const a=document.querySelector('section.on')?.id;
  if(a==='report'){await loadBal();await loadRep();}
  else if(a==='overview')await loadOverview();
  else if(a==='yoy')await loadYoy();
  else if(a==='yearly')await loadYearly();
  else if(a==='catTab')await loadCat();
  btn.classList.remove('spinning','syncing');setAgeLabel(0);
}

/* ── Fetch ── */
const SKIP=new Set(['安の','結算']);
async function batchFetch(endY,endM,count){
  const keys=[];
  for(let i=0;i<count;i++){let m=endM-i,y=endY;while(m<0){m+=12;y--;}keys.push(`${y}-${String(m+1).padStart(2,'0')}`);}
  const needed=keys.filter(k=>!mem[k]);
  if(needed.length){
    const[mr,sr]=await Promise.all([
      fetch(`${API}?months=${count}&endyear=${endY}&endmonth=${endM+1}&source=main`).then(r=>r.json()).catch(()=>({})),
      fetch(`${API}?months=${count}&endyear=${endY}&endmonth=${endM+1}&source=shared`).then(r=>r.json()).catch(()=>({}))
    ]);
    for(const k of keys){
      const main=Array.isArray(mr[k])?mr[k]:[];
      const shared=(Array.isArray(sr[k])?sr[k]:[]).filter(r=>!SKIP.has(r.category)&&Number(r.amount)>0&&Number(r.amount)<100000);
      mem[k]={main,shared};
    }
    saveCache();
  }
  const res={};for(const k of keys)res[k]=mem[k]||{main:[],shared:[]};return res;
}
async function getMonth(y,m){
  const k=`${y}-${String(m+1).padStart(2,'0')}`;
  if(mem[k])return mem[k];
  return(await batchFetch(y,m,1))[k]||{main:[],shared:[]};
}
function invalidate(dateStr){const k=String(dateStr).slice(0,7);delete mem[k];try{localStorage.setItem(CK,JSON.stringify(mem));}catch(e){}}

/* ── Calc ── */
function calcMonth(d){
  const main=d.main||[],shared=d.shared||[];
  const inc=main.filter(r=>r.category==='收入').reduce((s,r)=>s+Number(r.amount),0);
  const pExp=main.filter(r=>r.category!=='收入').reduce((s,r)=>s+Number(r.amount),0);
  const sExp=shared.reduce((s,r)=>s+Number(r.amount)/2,0);
  return{inc,pExp,sExp,exp:pExp+sExp,bal:inc-pExp-sExp};
}
function calcCats(d){
  const map={};
  (d.main||[]).filter(r=>r.category!=='收入').forEach(r=>{map[r.category]=(map[r.category]||0)+Number(r.amount);});
  (d.shared||[]).forEach(r=>{map[r.category]=(map[r.category]||0)+Number(r.amount)/2;});
  return map;
}
function getRange(endY,endM,n){const r=[];for(let i=n-1;i>=0;i--){let m=endM-i,y=endY;while(m<0){m+=12;y--;}r.push({y,m});}return r;}
function fmt(n){return Math.round(n).toLocaleString();}
function sign(n){return n>0?'+':(n<0?'':'+');}
function cc(name,idx){const i=CAT_NAMES.indexOf(name);return CAT_COLORS[i>=0?i:idx%CAT_COLORS.length];}
function dk(){return window.matchMedia('(prefers-color-scheme:dark)').matches;}
function gc(a,b){return dk()?a:b;}

/* ── Tab ── */
function sw(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');
  document.querySelectorAll('section').forEach(s=>s.classList.remove('on'));
  document.getElementById(name).classList.add('on');
  const map={report:()=>{loadBal();loadRep();},overview:loadOverview,yoy:loadYoy,yearly:loadYearly,catTab:loadCat,inst:renderInsts};
  map[name]?.();
}

/* ── Entry ── */
function init(){
  document.getElementById('hdrD').textContent=NOW.getFullYear()+'.'+String(NOW.getMonth()+1).padStart(2,'0')+'.'+String(NOW.getDate()).padStart(2,'0');
  document.getElementById('dt').value=NOW.toISOString().split('T')[0];
  const g=document.getElementById('cgrid');
  CATS_DEF.forEach(c=>{
    const b=document.createElement('button');b.className='cb'+(c.i?' inc':'');b.textContent=c.n;
    b.onclick=()=>{document.querySelectorAll('.cb').forEach(x=>x.classList.remove('on'));b.classList.add('on');selCat=c.n;if(c.i){document.getElementById('itog').checked=false;document.getElementById('ibox').style.display='none';}};
    g.appendChild(b);
  });
  [2,3,6,10,12,24,30,36].forEach(n=>{
    const b=document.createElement('button');b.className='pill'+(n===3?' on':'');b.textContent=n+'期';
    b.onclick=()=>{selM=n;document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));b.classList.add('on');uprev();};
    document.getElementById('pills').appendChild(b);
  });
}
function togi(){document.getElementById('ibox').style.display=document.getElementById('itog').checked?'block':'none';uprev();}
function uprev(){const a=parseFloat(document.getElementById('amt').value)||0;document.getElementById('iprev').textContent=a>0?`每月約 NT$${Math.ceil(a/selM).toLocaleString()}，共 ${selM} 個月`:'請先輸入金額';}
async function send(p){await fetch(API+'?'+new URLSearchParams(p).toString(),{mode:'no-cors'});}

async function submit(){
  if(!selCat){toast('請選擇類別');return;}
  const amt=parseFloat(document.getElementById('amt').value);
  if(!amt||amt<=0){toast('請輸入正確金額');return;}
  const date=document.getElementById('dt').value,note=document.getElementById('note').value.trim();
  const isInst=document.getElementById('itog').checked&&selCat!=='收入';
  const btn=document.getElementById('sbtn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>送出中…';
  try{
    if(isInst){
      const mo=Math.ceil(amt/selM),st=new Date(date);
      const obj={id:Date.now(),category:selCat,total:amt,monthly:mo,months:selM,note,startYear:st.getFullYear(),startMonth:st.getMonth()};
      insts.push(obj);localStorage.setItem('fi',JSON.stringify(insts));
      for(let i=0;i<selM;i++){
        const d=new Date(st.getFullYear(),st.getMonth()+i,1);
        const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01';
        await send({date:ds,category:selCat,amount:mo,note:(note?note+' ':'')+'[分期'+(i+1)+'/'+selM+']',installment:(i+1)+'/'+selM});
        invalidate(ds);
      }
    }else{
      await send({date,category:selCat,amount:amt,note,installment:''});
      invalidate(date);
    }
    toast(isInst?`分期建立！每月 NT$${Math.ceil(amt/selM).toLocaleString()}，共 ${selM} 期`:`NT$${amt.toLocaleString()} 已記錄 ✓`);
    document.getElementById('amt').value='';document.getElementById('note').value='';
    document.getElementById('itog').checked=false;document.getElementById('ibox').style.display='none';
    document.querySelectorAll('.cb').forEach(b=>b.classList.remove('on'));selCat=null;
    const mo=String(new Date(date).getMonth()+1).padStart(2,'0');
    const rows=await fetch(`${API}?year=${new Date(date).getFullYear()}&month=${mo}`).then(r=>r.json()).catch(()=>[]);
    showOv(new Date(date).getFullYear(),mo,Array.isArray(rows)?rows:[],'記帳成功 ✓');
  }catch(err){toast('送出失敗，請稍後再試');console.error(err);}
  btn.disabled=false;btn.innerHTML='送出記帳';
}

/* ── 月報表 ── */
function cm(d){repMo+=d;if(repMo>11){repMo=0;repY++;}if(repMo<0){repMo=11;repY--;}loadRep();}
async function loadRep(){
  document.getElementById('mlbl').textContent=repY+'年 '+MN[repMo];
  document.getElementById('txl').innerHTML='<div class="emp">載入中…</div>';
  const d=await getMonth(repY,repMo);
  renderTX(d.main);
}
function renderTX(rows){
  const el=document.getElementById('txl');
  if(!rows.length){el.innerHTML='<div class="emp">本月尚無記錄</div>';return;}
  el.innerHTML=[...rows].sort((a,b)=>String(b.date).localeCompare(String(a.date))).map((r,i)=>{
    const isI=r.category==='收入',it=r.installment?'<span class="tit">分期</span>':'';
    const key=encodeURIComponent(JSON.stringify({date:r.date,category:r.category,amount:r.amount,note:r.note}));
    return`<div class="ti" id="ti-${i}"><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:5px"><span class="tc">${r.category}</span>${it}<span style="font-size:11px;color:var(--t3)">${String(r.date).slice(5)}</span></div>${r.note?`<div class="tn">${r.note}</div>`:''}</div><div style="display:flex;align-items:center;gap:8px;flex-shrink:0"><span class="${isI?'tai':'tae'}">${isI?'+':'-'}$${fmt(Number(r.amount))}</span><button onclick="deleteTx('${key}','ti-${i}')" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:15px;padding:2px 4px;opacity:.6">✕</button></div></div>`;
  }).join('');
}
async function deleteTx(key,rowId){
  const r=JSON.parse(decodeURIComponent(key));
  if(!confirm(`刪除「${r.category} $${r.amount}」？`))return;
  try{
    await fetch(`${API}?deleterow=1&date=${encodeURIComponent(r.date)}&category=${encodeURIComponent(r.category)}&amount=${r.amount}&note=${encodeURIComponent(r.note||'')}`,{mode:'no-cors'});
    document.getElementById(rowId).style.opacity='0.3';document.getElementById(rowId).style.pointerEvents='none';
    invalidate(r.date);toast('已送出刪除請求');
  }catch(e){toast('刪除失敗');}
}

/* ── 總資產餘額 ── */
async function loadBal(){
  try{
    const today=new Date().toISOString().split('T')[0];
    const[p,s]=await Promise.all([fetch(API).then(r=>r.json()).catch(()=>[]),fetch(`${API}?source=shared`).then(r=>r.json()).catch(()=>[])]);
    const pR=(Array.isArray(p)?p:(p.main||[])).filter(r=>String(r.date)<=today);
    const sR=(Array.isArray(s)?s:[]).filter(r=>String(r.date)<=today);
    const pInc=pR.filter(r=>r.category==='收入').reduce((s,r)=>s+Number(r.amount),0);
    const pExp=pR.filter(r=>r.category!=='收入').reduce((s,r)=>s+Number(r.amount),0);
    const sExp=sR.filter(r=>!SKIP.has(r.category)&&Number(r.amount)>0&&Number(r.amount)<100000).reduce((s,r)=>s+Number(r.amount)/2,0);
    const bal=pInc-pExp-sExp;
    document.getElementById('balNum').textContent=(bal<0?'-':'')+'NT$'+fmt(Math.abs(bal));
    document.getElementById('balSub').textContent=`收入 $${fmt(pInc)} — 個人 $${fmt(pExp)} — 共同½ $${fmt(sExp)}`;
  }catch(e){document.getElementById('balNum').textContent='載入失敗';document.getElementById('balSub').textContent='';}
}
function toggleBal(){balHidden=!balHidden;document.getElementById('balNum').classList.toggle('hidden',balHidden);document.getElementById('balSub').classList.toggle('hidden',balHidden);}

/* ── 本月概況 ── */
function shiftOv(d){ovM+=d;if(ovM>11){ovM=0;ovY++;}if(ovM<0){ovM=11;ovY--;}loadOverview();}
async function loadOverview(){
  document.getElementById('ovLabel').textContent=`${ovY}年 ${MN[ovM]}`;
  document.getElementById('ovMetrics').innerHTML='<div style="grid-column:1/-1" class="lmsg">載入中…</div>';
  document.getElementById('ovCatList').innerHTML='<div class="lmsg">載入中…</div>';
  document.getElementById('donutLegend').innerHTML='';
  const d=await getMonth(ovY,ovM);
  const{inc,pExp,sExp,exp,bal}=calcMonth(d);
  const cats=calcCats(d),sorted=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const total=sorted.reduce((s,[,v])=>s+v,0)||1;
  document.getElementById('ovMetrics').innerHTML=`
    <div class="mc"><div class="ml">收入</div><div class="mn gi">$${fmt(inc)}</div></div>
    <div class="mc"><div class="ml">支出</div><div class="mn ri">$${fmt(exp)}</div><div class="mn-sub">個 $${fmt(pExp)} + 共½ $${fmt(sExp)}</div></div>
    <div class="mc"><div class="ml">結餘</div><div class="mn ${bal>=0?'bi':'ri'}">${bal<0?'-':''}$${fmt(Math.abs(bal))}</div></div>`;
  if(donutC)donutC.destroy();
  const top=sorted.slice(0,8),oth=sorted.slice(8).reduce((s,[,v])=>s+v,0);
  const dd=[...top,...(oth>0?[['其他',oth]]:[])],dc=dd.map(([n],i)=>cc(n,i));
  donutC=new Chart(document.getElementById('donutChart'),{
    type:'doughnut',data:{labels:dd.map(([n])=>n),datasets:[{data:dd.map(([,v])=>v),backgroundColor:dc,borderWidth:2,borderColor:'var(--sf)',hoverOffset:4}]},
    options:{responsive:false,cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` $${fmt(ctx.parsed)} (${(ctx.parsed/total*100).toFixed(1)}%)`}}}}
  });
  document.getElementById('donutLegend').innerHTML=dd.slice(0,7).map(([n,v],i)=>`<div class="legend-item"><div class="legend-dot" style="background:${dc[i]}"></div><span class="legend-text">${n}</span><span class="legend-pct">${(v/total*100).toFixed(0)}%</span></div>`).join('');
  document.getElementById('ovCatList').innerHTML=sorted.map(([n,v],i)=>`
    <div class="cat-row"><div class="cat-dot" style="background:${cc(n,i)}"></div><span class="cat-name">${n}</span>
    <div class="cat-bar-wrap"><div class="cat-bar" style="width:${(v/sorted[0][1]*100).toFixed(0)}%;background:${cc(n,i)}"></div></div>
    <span class="cat-pct">${(v/total*100).toFixed(1)}%</span><span class="cat-amt">$${fmt(v)}</span></div>`).join('');
}

/* ── 同期比較 ── */
function shiftYoy(d){yoyM+=d;if(yoyM>11){yoyM=0;yoyY++;}if(yoyM<0){yoyM=11;yoyY--;}loadYoy();}
async function loadYoy(){
  document.getElementById('yoyLabel').textContent=`${yoyY}年 ${MN[yoyM]}`;
  document.getElementById('yoyMetrics').innerHTML='<div style="grid-column:1/-1" class="lmsg">載入中…</div>';
  document.getElementById('yoyList').innerHTML='<div class="lmsg">載入中…</div>';
  const[cur,prev]=await Promise.all([getMonth(yoyY,yoyM),getMonth(yoyY-1,yoyM)]);
  const c=calcMonth(cur),p=calcMonth(prev),cc2=calcCats(cur),pc=calcCats(prev);
  const expD=c.exp-p.exp,incD=c.inc-p.inc;
  document.getElementById('yoyMetrics').innerHTML=`
    <div class="mc"><div class="ml">今年支出</div><div class="mn ri">$${fmt(c.exp)}</div><div class="mn-sub ${expD>0?'ri':'gi'}">${expD>=0?'+':''}$${fmt(Math.abs(expD))}</div></div>
    <div class="mc"><div class="ml">去年支出</div><div class="mn" style="color:var(--t2)">$${fmt(p.exp)}</div></div>
    <div class="mc"><div class="ml">今年收入</div><div class="mn gi">$${fmt(c.inc)}</div><div class="mn-sub ${incD>=0?'gi':'ri'}">${incD>=0?'+':''}$${fmt(Math.abs(incD))}</div></div>`;
  const allC=[...new Set([...Object.keys(cc2),...Object.keys(pc)])].sort((a,b)=>(cc2[b]||0)-(cc2[a]||0));
  document.getElementById('yoyList').innerHTML=allC.length?allC.map(cat=>{
    const cv=cc2[cat]||0,pv=pc[cat]||0,diff=cv-pv;
    const cls=diff>50?'up':diff<-50?'dn':'eq';
    return`<div class="yoy-row"><span class="yoy-lbl">${cat}</span><div class="yoy-vals"><span class="yoy-cur">$${fmt(cv)}</span><span class="yoy-diff ${cls}">${diff===0?'—':(diff>=0?'+':'')+'$'+fmt(Math.abs(diff))}</span></div></div>`;
  }).join(''):'<div class="lmsg">無資料</div>';
}

/* ── 年度總覽 ── */
async function loadYearly(){
  document.getElementById('yearlyStats').innerHTML='<div class="lmsg">載入中…</div>';
  const batch=await batchFetch(yearlyYear,11,12);
  const lbls=[],incs=[],exps=[];let totalInc=0,totalExp=0,maxExp=0,maxExpM=0;
  for(let m=0;m<12;m++){
    const k=`${yearlyYear}-${String(m+1).padStart(2,'0')}`,{inc,exp}=calcMonth(batch[k]||{});
    lbls.push(MN[m]);incs.push(inc);exps.push(exp);totalInc+=inc;totalExp+=exp;
    if(exp>maxExp){maxExp=exp;maxExpM=m;}
  }
  if(yearlyC)yearlyC.destroy();
  yearlyC=new Chart(document.getElementById('yearlyChart'),{type:'line',data:{labels:lbls,datasets:[
    {label:'收入',data:incs,borderColor:'#5DCAA5',backgroundColor:'rgba(93,202,165,0.1)',borderWidth:2.5,pointRadius:4,pointHoverRadius:6,tension:.3,fill:true},
    {label:'支出',data:exps,borderColor:'#F09595',backgroundColor:'rgba(240,149,149,0.1)',borderWidth:2.5,pointRadius:4,pointHoverRadius:6,tension:.3,fill:true}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{font:{size:11},padding:10}}},
    scales:{x:{grid:{display:false},ticks:{color:gc('#6A6662','#9A9692'),font:{size:11}}},y:{grid:{color:gc('rgba(255,255,255,.05)','rgba(0,0,0,.06)')},ticks:{color:gc('#6A6662','#9A9692'),font:{size:11},callback:v=>v>=1000?Math.round(v/1000)+'k':v}}}}});
  const bal=totalInc-totalExp;
  document.getElementById('yearlyStats').innerHTML=`
    <div class="stat-row"><span class="stat-lbl">年度總收入</span><span class="stat-val gi">$${fmt(totalInc)}</span></div>
    <div class="stat-row"><span class="stat-lbl">年度總支出</span><span class="stat-val ri">$${fmt(totalExp)}</span></div>
    <div class="stat-row"><span class="stat-lbl">年度結餘</span><span class="stat-val ${bal>=0?'bi':'ri'}">${bal<0?'-':''}$${fmt(Math.abs(bal))}</span></div>
    <div class="stat-row"><span class="stat-lbl">月均支出</span><span class="stat-val">$${fmt(totalExp/12)}</span></div>
    <div class="stat-row"><span class="stat-lbl">支出最高月</span><span class="stat-val">${MN[maxExpM]} ($${fmt(maxExp)})</span></div>`;
}
function initYearSel(){
  const el=document.getElementById('yearSel');
  for(let y=NOW.getFullYear();y>=NOW.getFullYear()-3;y--){
    const b=document.createElement('button');b.className='year-pill'+(y===yearlyYear?' on':'');b.textContent=y+'年';
    b.onclick=()=>{document.querySelectorAll('.year-pill').forEach(x=>x.classList.remove('on'));b.classList.add('on');yearlyYear=y;loadYearly();};
    el.appendChild(b);
  }
}

/* ── 分類對比 ── */
function initCatSelect(){
  CAT_NAMES.forEach(c=>{
    const b=document.createElement('button');b.className='cat-pill'+(selectedCats.includes(c)?' on':'');b.textContent=c;
    b.onclick=()=>{b.classList.toggle('on');selectedCats=[...document.querySelectorAll('.cat-pill.on')].map(x=>x.textContent);loadCat();};
    document.getElementById('catSelect').appendChild(b);
  });
}
function shiftCat(d){catEndM+=d;if(catEndM>11){catEndM=0;catEndY++;}if(catEndM<0){catEndM=11;catEndY--;}loadCat();}
async function loadCat(){
  if(!selectedCats.length)return;
  const months=getRange(catEndY,catEndM,6),s=months[0],e=months[5];
  document.getElementById('catLabel').textContent=`${MN[s.m]} — ${MN[e.m]}`;
  const batch=await batchFetch(catEndY,catEndM,6);
  const labels=months.map(({y,m})=>MN[m]+(y!==NOW.getFullYear()?` '${String(y).slice(2)}`:''));
  const datasets=selectedCats.map((cat,ci)=>({
    label:cat,backgroundColor:cc(cat,ci),borderRadius:5,
    data:months.map(({y,m})=>{const k=`${y}-${String(m+1).padStart(2,'0')}`,d=batch[k]||{};
      return(d.main||[]).filter(r=>r.category===cat).reduce((s,r)=>s+Number(r.amount),0)+(d.shared||[]).filter(r=>r.category===cat).reduce((s,r)=>s+Number(r.amount)/2,0);})
  }));
  if(catC)catC.destroy();
  catC=new Chart(document.getElementById('catChart'),{type:'bar',data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{font:{size:11},padding:10}}},
      scales:{x:{grid:{display:false},ticks:{color:gc('#6A6662','#9A9692'),font:{size:12}}},y:{grid:{color:gc('rgba(255,255,255,.05)','rgba(0,0,0,.06)')},ticks:{color:gc('#6A6662','#9A9692'),font:{size:11},callback:v=>v>=1000?Math.round(v/1000)+'k':v}}}}});
}

/* ── 分期（從 Sheet 讀取，顯示尚未付清的項目）── */
async function renderInsts(){
  const el=document.getElementById('il');
  el.innerHTML='<div class="emp">載入中…</div>';
  try{
    // 讀取所有 main 資料，找出有分期標記的記錄
    const allRows=await fetch(API).then(r=>r.json()).catch(()=>[]);
    const rows=Array.isArray(allRows)?allRows:(allRows.main||[]);
    
    // 找出所有分期記錄，按備註+類別分組
    const groups={};
    rows.forEach(r=>{
      if(!r.installment)return;
      const m=String(r.installment).match(/^(\d+)\/(\d+)$/);
      if(!m)return;
      const cur=parseInt(m[1]),total=parseInt(m[2]);
      // 用「類別+總期數+備註前綴」作為分組 key
      const noteBase=String(r.note||'').replace(/\s*\[分期\d+\/\d+\]\s*/g,'').trim();
      const key=r.category+'|'+total+'|'+noteBase;
      if(!groups[key])groups[key]={category:r.category,note:noteBase,total:total,monthly:Number(r.amount),payments:[],dates:[]};
      groups[key].payments.push(cur);
      groups[key].dates.push(r.date);
    });

    // 篩選尚未付清的分期
    const active=Object.values(groups).filter(g=>{
      const maxPaid=Math.max(...g.payments);
      return maxPaid<g.total;
    });

    if(!active.length){el.innerHTML='<div class="emp">目前沒有進行中的分期</div>';return;}

    el.innerHTML=active.map(g=>{
      const paid=Math.max(...g.payments);
      const rem=g.total-paid;
      const pct=Math.round(paid/g.total*100);
      const totalAmt=g.monthly*g.total;
      // 計算預估結束月份
      const lastDate=g.dates.sort().pop();
      const ld=new Date(lastDate);
      const endDate=new Date(ld.getFullYear(),ld.getMonth()+rem,1);
      const es=endDate.getFullYear()+'/'+(endDate.getMonth()+1);
      return`<div class="ic">
        <div style="display:flex;justify-content:space-between;align-items:start">
          <div><div style="font-size:14px;font-weight:700">${g.note||g.category}</div>
          <div style="font-size:12px;color:var(--t3);margin-top:2px">${g.category} · 共 NT$${fmt(totalAmt)} · 每月 NT$${fmt(g.monthly)}</div></div>
        </div>
        <div class="ipr"><div class="ib" style="width:${pct}%"></div></div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:12px;color:var(--t3)">${paid}/${g.total} 期 · 預計到 ${es}</span>
          <span class="bdg bbl">剩 ${rem} 期</span>
        </div>
      </div>`;
    }).join('');
  }catch(e){
    el.innerHTML='<div class="emp">載入失敗</div>';
    console.error(e);
  }
}

/* ── Modal / Toast / CC ── */
function showOv(y,m,rows,sub){
  document.getElementById('mbdg').textContent=y+'年 '+MN[parseInt(m)-1];
  document.getElementById('ms').textContent=sub;
  const inc=rows.filter(r=>r.category==='收入').reduce((s,r)=>s+Number(r.amount),0);
  const exp=rows.filter(r=>r.category!=='收入').reduce((s,r)=>s+Number(r.amount),0);
  const bal=inc-exp;
  document.getElementById('mm').innerHTML=`<div class="mc"><div class="ml">收入</div><div class="mn gi">$${fmt(inc)}</div></div><div class="mc"><div class="ml">支出</div><div class="mn ri">$${fmt(exp)}</div></div><div class="mc"><div class="ml">結餘</div><div class="mn ${bal>=0?'bi':'ri'}">${bal<0?'-':''}$${fmt(Math.abs(bal))}</div></div>`;
  const tots={};rows.filter(r=>r.category!=='收入').forEach(r=>{tots[r.category]=(tots[r.category]||0)+Number(r.amount);});
  const srt=Object.entries(tots).sort((a,b)=>b[1]-a[1]).slice(0,5),mx=srt[0]?srt[0][1]:1;
  document.getElementById('mbd').innerHTML=srt.length?srt.map(([c,a])=>`<div class="br"><span class="bn">${c}</span><div class="bbg"><div class="bf" style="width:${Math.round(a/mx*100)}%;background:var(--r)"></div></div><span class="ba">$${fmt(a)}</span></div>`).join(''):'<div style="font-size:13px;color:var(--t3)">本月尚無支出</div>';
  document.getElementById('ov').classList.add('show');
}
function closeOv(){document.getElementById('ov').classList.remove('show');}
function toast(msg){const t=document.getElementById('tst');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

const CC_CARDS=['ctbc','fubon','esun'],CC_DATES={ctbc:7,fubon:20,esun:21};
function ccKey(id){const n=new Date();return`cc_${id}_${n.getFullYear()}_${n.getMonth()+1}`;}
function initCC(){
  const today=new Date().getDate();
  CC_CARDS.forEach(id=>{
    const key=ccKey(id),checked=localStorage.getItem(key)==='1';
    const row=document.getElementById('cc-'+id),cb=row.querySelector('.cc-check');
    cb.checked=checked;if(checked)row.classList.add('done');
    const diff=CC_DATES[id]-today;
    if(!checked&&diff>=0&&diff<=3){const badge=document.createElement('span');badge.className='cc-alert';badge.textContent=diff===0?'今天！':`${diff} 天後`;row.querySelector('.cc-info').appendChild(badge);}
  });
}
function ccCheck(id,el){localStorage.setItem(ccKey(id),el.checked?'1':'0');document.getElementById('cc-'+id).classList.toggle('done',el.checked);}

/* ── Init ── */
loadCache();
init();
initYearSel();
initCatSelect();
initCC();
</script>
