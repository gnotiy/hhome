<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>記帳很重要</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --g:#1D9E75;--gl:#E1F5EE;--gd:#0A5040;
  --r:#E24B4A;--b:#378ADD;--bl:#E6F1FB;
  --bg:#F7F5F0;--sf:#FFFFFF;--sf2:#EFEFEA;
  --bd:rgba(0,0,0,0.09);--bds:rgba(0,0,0,0.15);
  --t1:#1A1917;--t2:#5A5854;--t3:#9A9692;
  --ra:14px;--rs:8px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#141412;--sf:#1E1D1B;--sf2:#272522;
  --bd:rgba(255,255,255,0.08);--bds:rgba(255,255,255,0.15);
  --t1:#F0EDE8;--t2:#A09C97;--t3:#6A6662;
  --gl:#0A2E1E;--bl:#0A1E30;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
.wrap{max-width:480px;margin:0 auto;padding-bottom:60px}
.hdr{padding:24px 20px 14px;display:flex;align-items:baseline;justify-content:space-between}
.hdr h1{font-size:22px;font-weight:700}
.hdr-d{font-family:'DM Mono',monospace;font-size:12px;color:var(--t3)}
.tabs{display:flex;margin:0 16px 14px;background:var(--sf2);border-radius:var(--rs);padding:3px;gap:2px}
.tab{flex:1;padding:8px 4px;border:none;background:transparent;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--t3);font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.tab.on{background:var(--sf);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.card{background:var(--sf);border-radius:var(--ra);border:1px solid var(--bd);margin:0 16px 12px;padding:18px}
.slbl{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px}
.cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.cb{padding:10px 2px;border:1px solid var(--bds);background:var(--sf);border-radius:var(--rs);font-size:13px;cursor:pointer;color:var(--t2);text-align:center;font-family:'Noto Sans TC',sans-serif;transition:all .12s;line-height:1.3}
.cb:active{transform:scale(.95)}
.cb.inc{border-color:var(--g);background:var(--gl);color:var(--gd)}
.cb.on{background:var(--g);color:#fff;border-color:var(--g);font-weight:700}
.cb.inc.on{background:var(--gd);border-color:var(--gd)}
.div{height:1px;background:var(--bd);margin:14px 0}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.lbl{font-size:12px;color:var(--t3)}
input[type=number],input[type=date],input[type=text]{width:100%;padding:10px 12px;border:1px solid var(--bds);border-radius:var(--rs);background:var(--bg);color:var(--t1);font-size:15px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .15s}
input:focus{border-color:var(--g)}
.trow{display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px;border-top:1px solid var(--bd);margin-top:4px}
.tog{position:relative;width:44px;height:24px;cursor:pointer;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tsl{position:absolute;inset:0;background:var(--bds);border-radius:12px;transition:.2s}
.tsl:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
input:checked+.tsl{background:var(--b)}
input:checked+.tsl:before{transform:translateX(20px)}
.ibox{background:var(--sf2);border-radius:var(--rs);padding:12px;margin-bottom:12px}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.pill{padding:5px 13px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid var(--bds);background:transparent;color:var(--t2);font-family:'Noto Sans TC',sans-serif;transition:all .12s}
.pill.on{background:var(--b);color:#fff;border-color:var(--b)}
.iprev{font-size:12px;color:var(--t3);margin-top:8px;min-height:16px}
.sbtn{width:100%;padding:15px;background:#E8D5B0;color:#5C4A2A;border:1px solid #C9B48A;border-radius:var(--ra);font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:opacity .15s,transform .1s;margin:0 16px;width:calc(100% - 32px)}
.sbtn:active:not(:disabled){transform:scale(.98);opacity:.85}
.sbtn:disabled{opacity:.5;cursor:not-allowed}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.m3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.mc{background:var(--sf2);border-radius:var(--rs);padding:12px;text-align:center}
.ml{font-size:11px;color:var(--t3)}
.mn{font-size:18px;font-weight:700;margin-top:4px;font-family:'DM Mono',monospace}
.gi{color:var(--g)}.ri{color:var(--r)}.bi{color:var(--b)}
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mnav button{background:none;border:1px solid var(--bds);border-radius:var(--rs);padding:6px 14px;cursor:pointer;font-size:16px;color:var(--t1);font-family:'Noto Sans TC',sans-serif}
.mlbl{font-size:16px;font-weight:700}
.cw{position:relative;width:100%;height:175px;margin-bottom:4px}
.br{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bn{font-size:12px;color:var(--t2);min-width:44px}
.bbg{flex:1;height:5px;background:var(--sf2);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px;background:var(--r)}
.ba{font-size:12px;color:var(--t3);min-width:62px;text-align:right;font-family:'DM Mono',monospace}
.tl{display:flex;flex-direction:column;max-height:320px;overflow-y:auto}
.ti{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bd)}
.ti:last-child{border-bottom:none}
.tc{font-size:11px;padding:2px 7px;border-radius:10px;background:var(--sf2);color:var(--t3)}
.tn{font-size:12px;color:var(--t3);margin-top:2px}
.tai{color:var(--g);font-weight:700;font-family:'DM Mono',monospace;font-size:14px}
.tae{color:var(--r);font-weight:700;font-family:'DM Mono',monospace;font-size:14px}
.tit{font-size:10px;color:var(--b);margin-left:4px}
.emp{text-align:center;padding:2rem;color:var(--t3);font-size:14px}
.ic{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:14px;margin-bottom:8px}
.ipr{height:4px;background:var(--sf2);border-radius:2px;margin:10px 0;overflow:hidden}
.ib{height:100%;background:var(--b);border-radius:2px}
.bdg{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700}
.bbl{background:var(--bl);color:var(--b)}
.bgl{background:var(--gl);color:var(--g)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;transition:opacity .2s;pointer-events:none}
.ov.show{opacity:1;pointer-events:all}
.mod{background:var(--sf);border-radius:20px;padding:24px;width:min(380px,92vw);border:1px solid var(--bd);transform:translateY(16px);transition:transform .22s}
.ov.show .mod{transform:translateY(0)}
.mbdg{display:inline-block;background:var(--gl);color:var(--gd);font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:10px}
.mt{font-size:18px;font-weight:700;margin-bottom:3px}
.ms{font-size:13px;color:var(--t3);margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--bd)}
.cbtn{width:100%;padding:12px;border:1px solid var(--bds);background:transparent;border-radius:var(--rs);font-size:14px;cursor:pointer;color:var(--t1);font-family:'Noto Sans TC',sans-serif;font-weight:500}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1917;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:200;white-space:nowrap;font-family:'Noto Sans TC',sans-serif}
.toast.show{opacity:1}

.balance-card{background:var(--sf);border-radius:var(--ra);margin:16px 16px 12px;padding:14px 20px;color:var(--t1);border:1px solid var(--bds);cursor:pointer;user-select:none}
.balance-num{font-size:28px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-1px;transition:filter .25s;color:var(--t1)}
.balance-num.hidden{filter:blur(8px)}
.balance-sub{font-size:12px;color:var(--t3);margin-top:4px;transition:filter .25s}
.balance-sub.hidden{filter:blur(6px)}
.balance-label{font-size:12px;opacity:.8;margin-bottom:4px}
.cc-card{background:var(--sf);border-radius:var(--ra);border:1px solid var(--bd);margin:0 16px 12px;padding:16px 18px}
.cc-title{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:12px}
.cc-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bd)}
.cc-row:last-child{border-bottom:none}
.cc-info{display:flex;align-items:center;gap:10px}
.cc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cc-name{font-size:14px;font-weight:500;color:var(--t1)}
.cc-date{font-size:12px;color:var(--t3);margin-top:1px}
.cc-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--bds);background:transparent;cursor:pointer;appearance:none;-webkit-appearance:none;flex-shrink:0;transition:all .15s;position:relative}
.cc-check:checked{background:var(--g);border-color:var(--g)}
.cc-check:checked::after{content:'✓';position:absolute;color:white;font-size:12px;font-weight:700;top:50%;left:50%;transform:translate(-50%,-50%)}
.cc-row.done .cc-name{text-decoration:line-through;opacity:.5}
.cc-row.done .cc-date{opacity:.4}
.cc-alert{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700;background:#FAEEDA;color:#633806}

section{display:none}section.on{display:block}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <h1>記帳很重要</h1>
    <span class="hdr-d" id="hdrD"></span>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="sw('entry',this)">記帳</button>
    <button class="tab" onclick="sw('report',this)">月報表</button>
    <button class="tab" onclick="sw('inst',this)">分期</button>
  </div>

  <section id="entry" class="on">
    <div class="card" style="padding-bottom:12px">
      <div class="slbl">類別</div>
      <div class="cgrid" id="cgrid"></div>
      <div class="div"></div>
      <div class="r2" style="margin-top:12px">
        <div class="fg"><span class="lbl">金額（NT$）</span><input type="number" id="amt" placeholder="0" min="0" step="1" oninput="uprev()"></div>
        <div class="fg"><span class="lbl">日期</span><input type="date" id="dt"></div>
      </div>
      <div class="fg"><span class="lbl">備註（選填）</span><input type="text" id="note" placeholder=""></div>
      <div class="trow">
        <div>
          <div style="font-size:14px;font-weight:500">分期付款</div>
          <div style="font-size:12px;color:var(--t3);margin-top:2px">平均分配到每個月</div>
        </div>
        <label class="tog"><input type="checkbox" id="itog" onchange="togi()"><span class="tsl"></span></label>
      </div>
      <div class="ibox" id="ibox" style="display:none">
        <div class="lbl">分幾期？</div>
        <div class="pills" id="pills"></div>
        <div class="iprev" id="iprev"></div>
      </div>
    </div>
    <button class="sbtn" id="sbtn" onclick="submit()">送出記帳</button>

  <div class="balance-card" id="balanceCard" onclick="toggleBalance()">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <div class="balance-label" style="margin-bottom:0;color:var(--t3)">總資產餘額</div>
      <span id="balanceEye" style="font-size:13px;color:var(--t3)">點擊顯示</span>
    </div>
    <div class="balance-num hidden" id="balanceNum">計算中…</div>
    <div class="balance-sub hidden" id="balanceSub">載入所有記錄中</div>
  </div>
  <div class="cc-card">
    <div class="cc-title">信用卡帳單提醒</div>
    <div class="cc-row" id="cc-ctbc">
      <div class="cc-info">
        <div class="cc-dot" style="background:#E24B4A"></div>
        <div>
          <div class="cc-name">中信銀行</div>
          <div class="cc-date">每月 7 日出帳</div>
        </div>
      </div>
      <input type="checkbox" class="cc-check" onchange="ccCheck('ctbc',this)">
    </div>
    <div class="cc-row" id="cc-fubon">
      <div class="cc-info">
        <div class="cc-dot" style="background:#378ADD"></div>
        <div>
          <div class="cc-name">富邦銀行</div>
          <div class="cc-date">每月 20 日出帳</div>
        </div>
      </div>
      <input type="checkbox" class="cc-check" onchange="ccCheck('fubon',this)">
    </div>
    <div class="cc-row" id="cc-esun">
      <div class="cc-info">
        <div class="cc-dot" style="background:#1D9E75"></div>
        <div>
          <div class="cc-name">玉山銀行</div>
          <div class="cc-date">每月 21 日出帳</div>
        </div>
      </div>
      <input type="checkbox" class="cc-check" onchange="ccCheck('esun',this)">
    </div>
  </div>
  </section>

  <section id="report">
    <div class="card">
      <div class="mnav">
        <button onclick="cm(-1)">‹</button>
        <span class="mlbl" id="mlbl"></span>
        <button onclick="cm(1)">›</button>
      </div>
      <div class="m3" id="m3"></div>
    </div>
    <div class="card"><div class="slbl">支出分類</div><div id="cbd"></div></div>
    <div class="card"><div class="slbl" style="margin-bottom:8px">本月明細</div><div class="tl" id="txl"></div></div>

  </section>

  <section id="inst">
    <div class="card" style="padding:12px 18px"><span style="font-size:13px;color:var(--t3)">進行中的分期，每月自動計入支出</span></div>
    <div style="padding:0 16px" id="il"></div>
  </section>
</div>

<div class="ov" id="ov">
  <div class="mod">
    <div class="mbdg" id="mbdg"></div>
    <div class="mt">本月收支總覽</div>
    <div class="ms" id="ms"></div>
    <div class="m3" id="mm" style="margin-bottom:16px"></div>
    <div id="mbd" style="margin-bottom:16px"></div>
    <button class="cbtn" onclick="closeOv()">好，繼續記帳</button>
  </div>
</div>
<div class="toast" id="tst"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const API='https://script.google.com/macros/s/AKfycbxIoYsdmZNjbonxcRtYcnyqXNxVBCh_DduL_t2N_agQ95E3ubAikeyYp3jvfqyXAqw8/exec';
const MN=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const CATS=[
  {n:'收入',i:true},
  {n:'餐費'},{n:'點心'},{n:'飲品'},{n:'咖啡'},{n:'飲酒'},{n:'煮食'},
  {n:'居家'},{n:'安の'},{n:'貓貓'},{n:'交通'},
  {n:'電子'},{n:'軟體'},{n:'娛樂'},{n:'美妝'},{n:'衣著'},
  {n:'貸款'},{n:'醫藥'},{n:'手續'},{n:'社交'},{n:'孝親'},{n:'其他'}
];
let selCat=null,selM=3,cY=new Date().getFullYear(),cMo=new Date().getMonth(),tc=null;
let insts=JSON.parse(localStorage.getItem('fi')||'[]');

function init(){
  const now=new Date();
  document.getElementById('hdrD').textContent=now.getFullYear()+'.'+String(now.getMonth()+1).padStart(2,'0')+'.'+String(now.getDate()).padStart(2,'0');
  document.getElementById('dt').value=now.toISOString().split('T')[0];
  const g=document.getElementById('cgrid');
  CATS.forEach(c=>{
    const b=document.createElement('button');
    b.className='cb'+(c.i?' inc':'');
    b.textContent=c.n;
    b.onclick=()=>{
      document.querySelectorAll('.cb').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');selCat=c.n;
      if(c.i){document.getElementById('itog').checked=false;document.getElementById('ibox').style.display='none';}
    };
    g.appendChild(b);
  });
  const pe=document.getElementById('pills');
  [2,3,6,10,12,24,30,36].forEach(n=>{
    const b=document.createElement('button');
    b.className='pill'+(n===3?' on':'');
    b.textContent=n+'期';
    b.onclick=()=>{selM=n;document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));b.classList.add('on');uprev();};
    pe.appendChild(b);
  });
}

function sw(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');
  document.querySelectorAll('section').forEach(s=>s.classList.remove('on'));
  document.getElementById(name).classList.add('on');
  if(name==='report')loadRep();
  if(name==='inst')renderInsts();
}

function togi(){document.getElementById('ibox').style.display=document.getElementById('itog').checked?'block':'none';uprev();}
function uprev(){
  const a=parseFloat(document.getElementById('amt').value)||0;
  document.getElementById('iprev').textContent=a>0?`每月約 NT$${Math.ceil(a/selM).toLocaleString()}，共 ${selM} 個月`:'請先輸入金額';
}

async function send(params){
  const url=API+'?'+new URLSearchParams(params).toString();
  await fetch(url,{mode:'no-cors'});
}

async function submit(){
  if(!selCat){toast('請選擇類別');return;}
  const amt=parseFloat(document.getElementById('amt').value);
  if(!amt||amt<=0){toast('請輸入正確金額');return;}
  const date=document.getElementById('dt').value;
  const note=document.getElementById('note').value.trim();
  const isInst=document.getElementById('itog').checked&&selCat!=='收入';
  const btn=document.getElementById('sbtn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>送出中…';
  try{
    if(isInst){
      const mo=Math.ceil(amt/selM);
      const st=new Date(date);
      const obj={id:Date.now(),category:selCat,total:amt,monthly:mo,months:selM,note,startYear:st.getFullYear(),startMonth:st.getMonth()};
      insts.push(obj);localStorage.setItem('fi',JSON.stringify(insts));
      for(let i=0;i<selM;i++){
        const d=new Date(st.getFullYear(),st.getMonth()+i,1);
        const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01';
        await send({date:ds,category:selCat,amount:mo,note:(note?note+' ':'')+'[分期'+(i+1)+'/'+selM+']',installment:(i+1)+'/'+selM});
      }
    } else {
      await send({date,category:selCat,amount:amt,note,installment:''});
    }
    await new Promise(r=>setTimeout(r,800));
    const [y,m]=date.split('-');
    const rows=await get(y,m);
    showOv(y,m,rows,isInst?`分期建立！每月 NT$${Math.ceil(amt/selM).toLocaleString()}，共 ${selM} 期`:`NT$${amt.toLocaleString()} 已記錄`);
    document.getElementById('amt').value='';document.getElementById('note').value='';
    document.getElementById('itog').checked=false;document.getElementById('ibox').style.display='none';
    document.querySelectorAll('.cb').forEach(b=>b.classList.remove('on'));selCat=null;
  }catch(err){toast('送出失敗，請稍後再試');console.error(err);}
  btn.disabled=false;btn.innerHTML='送出記帳';
}

async function get(y,m){
  try{ return await (await fetch(`${API}?year=${y}&month=${m}`)).json(); }catch(e){return[];}
}
async function getBoth(y,m){
  try{ return await (await fetch(`${API}?year=${y}&month=${m}&source=both`)).json(); }catch(e){return{main:[],shared:[]};}
}
async function getSource(y,m,src){
  try{ return await (await fetch(`${API}?year=${y}&month=${m}&source=${src}`)).json(); }catch(e){return[];}
}
async function getBatch(endY, endM, count){
  const key = `${endY}-${endM}-${count}`;
  if(_batchCacheKey === key && _batchCache) return _batchCache;
  try{
    // Fetch main and shared in parallel, each only reads its own sheet
    const [mainData, sharedData] = await Promise.all([
      fetch(`${API}?months=${count}&endyear=${endY}&endmonth=${endM}&source=main`).then(r=>r.json()).catch(()=>({})),
      fetch(`${API}?months=${count}&endyear=${endY}&endmonth=${endM}&source=shared`).then(r=>r.json()).catch(()=>({}))
    ]);
    // Merge into {month: {main:[], shared:[]}} format
    const result = {};
    const months = new Set([...Object.keys(mainData), ...Object.keys(sharedData)]);
    months.forEach(m=>{
      result[m] = {
        main: mainData[m] ? (mainData[m].main || mainData[m]) : [],
        shared: sharedData[m] ? (sharedData[m].shared || sharedData[m]) : []
      };
    });
    _batchCache = result;
    _batchCacheKey = key;
    return result;
  }catch(e){ return {}; }
}

function showOv(y,m,rows,sub){
  document.getElementById('mbdg').textContent=y+'年 '+MN[parseInt(m)-1];
  document.getElementById('ms').textContent=sub;
  const inc=rows.filter(r=>r.category==='收入').reduce((s,r)=>s+Number(r.amount),0);
  const exp=rows.filter(r=>r.category!=='收入').reduce((s,r)=>s+Number(r.amount),0);
  const bal=inc-exp;
  document.getElementById('mm').innerHTML=`
    <div class="mc"><div class="ml">收入</div><div class="mn gi">$${fmt(inc)}</div></div>
    <div class="mc"><div class="ml">支出</div><div class="mn ri">$${fmt(exp)}</div></div>
    <div class="mc"><div class="ml">結餘</div><div class="mn ${bal>=0?'bi':'ri'}">${bal<0?'-':''}$${fmt(Math.abs(bal))}</div></div>`;
  const tots={};rows.filter(r=>r.category!=='收入').forEach(r=>{tots[r.category]=(tots[r.category]||0)+Number(r.amount);});
  const srt=Object.entries(tots).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const mx=srt[0]?srt[0][1]:1;
  document.getElementById('mbd').innerHTML=srt.length?srt.map(([c,a])=>`<div class="br"><span class="bn">${c}</span><div class="bbg"><div class="bf" style="width:${Math.round(a/mx*100)}%"></div></div><span class="ba">$${fmt(a)}</span></div>`).join(''):'<div style="font-size:13px;color:var(--t3)">本月尚無支出</div>';
  document.getElementById('ov').classList.add('show');
}
function closeOv(){document.getElementById('ov').classList.remove('show');}

function cm(d){
  cMo+=d;if(cMo>11){cMo=0;cY++;}if(cMo<0){cMo=11;cY--;}loadRep();
}

async function loadRep(){
  const mo = String(cMo+1).padStart(2,'0');
  document.getElementById('mlbl').textContent=cY+'年 '+MN[cMo];
  document.getElementById('m3').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:12px;color:var(--t3);font-size:13px">載入中…</div>';
  document.getElementById('cbd').innerHTML='';document.getElementById('txl').innerHTML='';

  try{
    const [mainRes, sharedRes] = await Promise.all([
      fetch(`${API}?year=${cY}&month=${mo}`).then(r=>r.json()).catch(()=>[]),
      fetch(`${API}?year=${cY}&month=${mo}&source=shared`).then(r=>r.json()).catch(()=>[])
    ]);
    const rows = Array.isArray(mainRes) ? mainRes : [];
    const sharedRows = Array.isArray(sharedRes) ? sharedRes : [];
    renderM(rows, sharedRows);
    renderBD(rows, sharedRows);
    renderTX(rows);
  }catch(e){toast('載入失敗: '+e.message);}
}


function renderM(rows, sharedRows){
  const inc = rows.filter(r=>r.category==='收入').reduce((s,r)=>s+Number(r.amount),0);
  const pExp = rows.filter(r=>r.category!=='收入').reduce((s,r)=>s+Number(r.amount),0);
  const sExp = (sharedRows||[]).filter(r=>r.category!=='安の' && Number(r.amount)>0 && Number(r.amount)<100000).reduce((s,r)=>s+Number(r.amount)/2,0);
  const exp = pExp + sExp;
  const bal = inc - exp;
  document.getElementById('m3').innerHTML=`
    <div class="mc"><div class="ml">收入</div><div class="mn gi">$${fmt(inc)}</div></div>
    <div class="mc">
      <div class="ml">支出</div>
      <div class="mn ri">$${fmt(exp)}</div>
      <div style="font-size:10px;color:var(--t3);margin-top:4px;line-height:1.5">個人 $${fmt(pExp)}<br>共同½ $${fmt(sExp)}</div>
    </div>
    <div class="mc"><div class="ml">結餘</div><div class="mn ${bal>=0?'bi':'ri'}">${bal<0?'-':''}$${fmt(Math.abs(bal))}</div></div>`;
}

async function renderTrend(batch, endY, endMo){
  const lbls=[],incs=[],exps=[];
  for(let i=5;i>=0;i--){
    let m=endMo-i,y=endY;while(m<0){m+=12;y--;}
    lbls.push(MN[m]);
    const key=y+'-'+String(m+1).padStart(2,'0');
    const d=batch[key]||{main:[],shared:[]};
    const rows=d.main||[];
    const shared=d.shared||[];
    incs.push(rows.filter(r=>r.category==='收入').reduce((s,r)=>s+Number(r.amount),0));
    exps.push(
      rows.filter(r=>r.category!=='收入').reduce((s,r)=>s+Number(r.amount),0)+
      shared.filter(r=>r.category!=='安の'&&Number(r.amount)>0&&Number(r.amount)<100000).reduce((s,r)=>s+Number(r.amount)/2,0)
    );
  }
  if(tc)tc.destroy();
  const dk=window.matchMedia('(prefers-color-scheme:dark)').matches;
  tc=new Chart(document.getElementById('tc'),{
    type:'bar',data:{labels:lbls,datasets:[
      {label:'收入',data:incs,backgroundColor:'#5DCAA5',borderRadius:4},
      {label:'支出',data:exps,backgroundColor:'#F09595',borderRadius:4}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{color:dk?'#6A6662':'#9A9692',font:{size:11}}},
        y:{grid:{color:dk?'rgba(255,255,255,.05)':'rgba(0,0,0,.06)'},ticks:{color:dk?'#6A6662':'#9A9692',font:{size:11},callback:v=>v>=1000?(v/1000)+'k':v}}}}
  });
}


function renderBD(rows, sharedRows){
  const tots = {};
  rows.filter(r=>r.category!=='收入').forEach(r=>{
    if(!tots[r.category]) tots[r.category]={p:0,s:0};
    tots[r.category].p += Number(r.amount);
  });
  (sharedRows||[]).filter(r=>r.category!=='安の' && Number(r.amount)>0 && Number(r.amount)<100000).forEach(r=>{
    const half = Number(r.amount)/2;
    if(!tots[r.category]) tots[r.category]={p:0,s:0};
    tots[r.category].s += half;
  });
  const srt=Object.entries(tots).map(([c,v])=>([c,v.p+v.s,v.s,v.p===0&&v.s>0])).sort((a,b)=>b[1]-a[1]);
  const mx=srt[0]?srt[0][1]:1;
  document.getElementById('cbd').innerHTML=srt.length
    ?srt.map(([c,total,s,sharedOnly])=>`
      <div class="br">
        <span class="bn" style="${sharedOnly?'color:#8B7355':''}">${c}</span>
        <div class="bbg"><div class="bf" style="width:${Math.round(total/mx*100)}%;background:${sharedOnly?'#E8D5B0':'#378ADD'}"></div></div>
        <div style="min-width:80px;text-align:right;flex-shrink:0">
          <div class="ba">$${fmt(total)}</div>
          ${s>0?`<div style="font-size:10px;color:#8B7355;margin-top:1px">共同½ $${fmt(s)}</div>`:''}
        </div>
      </div>`).join('')
    :'<div class="emp">本月無支出記錄</div>';
}

function renderTX(rows){
  const el=document.getElementById('txl');
  if(!rows.length){el.innerHTML='<div class="emp">本月尚無記錄</div>';return;}
  const srt=[...rows].sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  el.innerHTML=srt.map(r=>{
    const isI=r.category==='收入';
    const it=r.installment?'<span class="tit">分期</span>':'';
    return`<div class="ti"><div><div style="display:flex;align-items:center;gap:5px"><span class="tc">${r.category}</span>${it}<span style="font-size:11px;color:var(--t3)">${String(r.date).slice(5)}</span></div>${r.note?`<div class="tn">${r.note}</div>`:''}</div><span class="${isI?'tai':'tae'}">${isI?'+':'-'}$${fmt(Number(r.amount))}</span></div>`;
  }).join('');
}

function renderShared(rows){
  const sec=document.getElementById('sharedSection');
  if(!rows||!rows.length){sec.style.display='none';return;}
  sec.style.display='block';
  const inc=rows.filter(r=>r.category==='收入').reduce((s,r)=>s+Number(r.amount),0);
  const exp=rows.filter(r=>r.category!=='收入').reduce((s,r)=>s+Number(r.amount),0);
  const bal=inc-exp;
  document.getElementById('sharedMetrics').innerHTML=`
    <div class="mc"><div class="ml">收入</div><div class="mn gi">$${fmt(inc)}</div></div>
    <div class="mc"><div class="ml">支出</div><div class="mn ri">$${fmt(exp)}</div></div>
    <div class="mc"><div class="ml">結餘</div><div class="mn ${bal>=0?'bi':'ri'}">${bal<0?'-':''}$${fmt(Math.abs(bal))}</div></div>`;
  const tots={};
  rows.filter(r=>r.category!=='收入').forEach(r=>{tots[r.category]=(tots[r.category]||0)+Number(r.amount);});
  const srt=Object.entries(tots).sort((a,b)=>b[1]-a[1]);const mx=srt[0]?srt[0][1]:1;
  document.getElementById('sharedBD').innerHTML=srt.length
    ?srt.map(([c,a])=>`<div class="br"><span class="bn">${c}</span><div class="bbg"><div class="bf" style="width:${Math.round(a/mx*100)}%;background:var(--b)"></div></div><span class="ba">$${fmt(a)}</span></div>`).join('')
    :'';
  const sorted=[...rows].sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  document.getElementById('sharedTX').innerHTML=sorted.slice(0,30).map(r=>{
    const isI=r.category==='收入';
    return`<div class="ti"><div><div style="display:flex;align-items:center;gap:5px"><span class="tc">${r.category}</span><span style="font-size:11px;color:var(--t3)">${String(r.date).slice(5)}</span></div>${r.note?`<div class="tn">${r.note}</div>`:''}</div><span class="${isI?'tai':'tae'}">${isI?'+':'-'}$${fmt(Number(r.amount))}</span></div>`;
  }).join('');
}

function renderInsts(){
  const el=document.getElementById('il');
  if(!insts.length){el.innerHTML='<div class="emp">目前沒有分期付款</div>';return;}
  const now=new Date();
  el.innerHTML=insts.map(inst=>{
    const paid=Math.min(inst.months,(now.getFullYear()-inst.startYear)*12+(now.getMonth()-inst.startMonth)+1);
    const rem=inst.months-paid;const pct=Math.round(paid/inst.months*100);
    const ed=new Date(inst.startYear,inst.startMonth+inst.months-1,1);
    const es=ed.getFullYear()+'/'+(ed.getMonth()+1);
    return`<div class="ic"><div style="display:flex;justify-content:space-between;align-items:start"><div><div style="font-size:14px;font-weight:700">${inst.note||inst.category}</div><div style="font-size:12px;color:var(--t3);margin-top:2px">${inst.category} · 共 NT$${fmt(inst.total)} · 每月 NT$${fmt(inst.monthly)}</div></div><button onclick="delI(${inst.id})" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:0">✕</button></div><div class="ipr"><div class="ib" style="width:${pct}%"></div></div><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:var(--t3)">${paid}/${inst.months} 期 · 到 ${es}</span><span class="bdg ${rem>0?'bbl':'bgl'}">${rem>0?`剩 ${rem} 期`:'已完成'}</span></div></div>`;
  }).join('');
}

function delI(id){insts=insts.filter(i=>i.id!==id);localStorage.setItem('fi',JSON.stringify(insts));renderInsts();toast('已刪除分期');}
function fmt(n){return Math.round(n).toLocaleString();}
function toast(msg){const t=document.getElementById('tst');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

async function loadBalance() {
  try {
    const today = new Date().toISOString().split('T')[0];
    const [personal, shared] = await Promise.all([
      fetch(`${API}`).then(r=>r.json()),
      fetch(`${API}?source=shared`).then(r=>r.json())
    ]);

    const allPersonal = Array.isArray(personal) ? personal : (personal.main || []);
    const allShared   = Array.isArray(shared)   ? shared   : [];
    const personalRows = allPersonal.filter(r=>String(r.date)<=today);
    const sharedRows   = allShared.filter(r=>String(r.date)<=today);

    const pInc = personalRows.filter(r=>r.category==='收入').reduce((s,r)=>s+Number(r.amount),0);
    const pExp = personalRows.filter(r=>r.category!=='收入').reduce((s,r)=>s+Number(r.amount),0);
    const sExp = sharedRows.filter(r=>r.category!=='安の' && Number(r.amount)>0 && Number(r.amount)<100000).reduce((s,r)=>s+Number(r.amount)/2,0);

    const totalExp = pExp + sExp;
    const bal = pInc - totalExp;

    document.getElementById('balanceNum').textContent = (bal<0?'-':'') + 'NT$' + fmt(Math.abs(bal));
    document.getElementById('balanceSub').textContent =
      `收入 $${fmt(pInc)} — 個人支出 $${fmt(pExp)} — 共同支出½ $${fmt(sExp)}`;
  } catch(e) {
    document.getElementById('balanceNum').textContent = '載入失敗';
    document.getElementById('balanceSub').textContent = '';
  }
}

// Credit card check state (resets each month)
const CC_CARDS = ['ctbc','fubon','esun'];
const CC_DATES = {ctbc:7, fubon:20, esun:21};

function ccKey(id) {
  const now = new Date();
  return `cc_${id}_${now.getFullYear()}_${now.getMonth()+1}`;
}

function initCC() {
  const now = new Date();
  const today = now.getDate();
  CC_CARDS.forEach(id => {
    const key = ccKey(id);
    const checked = localStorage.getItem(key) === '1';
    const row = document.getElementById('cc-'+id);
    const cb = row.querySelector('.cc-check');
    cb.checked = checked;
    if (checked) row.classList.add('done');

    // Show alert badge if within 3 days of due date
    const dueDay = CC_DATES[id];
    const diff = dueDay - today;
    if (!checked && diff >= 0 && diff <= 3) {
      const badge = document.createElement('span');
      badge.className = 'cc-alert';
      badge.textContent = diff === 0 ? '今天！' : `${diff} 天後`;
      row.querySelector('.cc-info').appendChild(badge);
    }
  });
}

function ccCheck(id, el) {
  localStorage.setItem(ccKey(id), el.checked ? '1' : '0');
  const row = document.getElementById('cc-'+id);
  row.classList.toggle('done', el.checked);
}

let balanceVisible = false;
function toggleBalance(){
  balanceVisible = !balanceVisible;
  const num = document.getElementById('balanceNum');
  const sub = document.getElementById('balanceSub');
  const eye = document.getElementById('balanceEye');
  num.classList.toggle('hidden', !balanceVisible);
  sub.classList.toggle('hidden', !balanceVisible);
  eye.textContent = balanceVisible ? '點擊隱藏' : '點擊顯示';
}
init();
loadBalance();
initCC();
